<!DOCTYPE html>
<html>
<head>
    <title>CVE Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

<h1>{{ cve.cve_id }}</h1>

<table class="table table-bordered">

<tr>
<td><b>Source</b></td>
<td>{{ cve.source }}</td>
</tr>

<tr>
<td><b>Published</b></td>
<td>{{ cve.published }}</td>
</tr>

<tr>
<td><b>Status</b></td>
<td>{{ cve.status }}</td>
</tr>

<tr>
<td><b>CVSS Score</b></td>
<td>{{ cve.cvss_score }}</td>
</tr>

</table>

<a href="/" class="btn btn-primary">Back</a>

</div>

</body>
</html>
