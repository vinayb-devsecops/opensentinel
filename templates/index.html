<!DOCTYPE html>
<html>
<head>
    <title>OpenSentinel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h1 class="mb-4">OpenSentinel Dashboard</h1>

    <div class="row">

        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5>Total CVEs</h5>
                    <h2>{{ cves|length }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5>Critical</h5>
                    <h2>{{ stats.Critical }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5>High</h5>
                    <h2>{{ stats.High }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5>Medium/Low</h5>
                    <h2>{{ stats.Medium + stats.Low }}</h2>
                </div>
            </div>
        </div>

    </div>

    <div class="card mt-4">
        <div class="card-header">
            CVE Inventory
        </div>

        <div class="card-body">

            <table class="table table-striped">

                <thead>
                    <tr>
                        <th>CVE ID</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>

                {% for cve in cves %}
                    <tr>
                        <td>{{ cve.cve_id }}</td>
                        <td>{{ cve.status }}</td>
                    </tr>
                {% endfor %}

                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
